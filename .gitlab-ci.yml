ssh_deploy:
  stage: deploy
  image: alpine
  before_script:
    # check if port 22 is open on the server
    - nc -zv $REMOTE_DEPLOY_HOST 22
    - echo $SSH_PRIVATE_KEY
    # grant read-only permission to the private key
    - chmod 400 $SSH_PRIVATE_KEY
    # install the OPENSSH agent
    - apk add --no-cache openssh-client
    # start the ssh agent
    - eval $(ssh-agent -s) #set softshell variables env in current shell session
    # add SSH Key to agent
    - ssh-add $SSH_PRIVATE_KEY
    # create .ssh directory and set permissions
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # create known_hosts file and add assign the right permissions
    - cp $SSH_KNOWN_HOSTS ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    # open SSH connection + run cmd + add more file into /tmp
    #- touch bar.txt
    #- scp bar.txt $REMOTE_DEPLOY_USER@$REMOTE_DEPLOY_HOST:/tmp
    - ssh $REMOTE_DEPLOY_USER@$REMOTE_DEPLOY_HOST "whoami; touch /tmp/foo.txt; ls -l /tmp"
    #update build dir to nginx html dir
    - scp -r build/* $REMOTE_DEPLOY_USER@$REMOTE_DEPLOY_HOST:/usr/share/nginx/html/



